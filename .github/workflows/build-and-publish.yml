name: Build & Publish Images

on:
  push:
    branches: [develop, main]
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/fstrike7/provincial-indicators-pipeline-api
  IMAGE_SPARK: ghcr.io/fstrike7/provincial-indicators-pipeline-spark-jobs

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=raw,value=dev-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=develop-latest,enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=main-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/main') }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-spark-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SPARK }}
          tags: |
            type=raw,value=dev-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=develop-latest,enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=main-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/main') }}

      - name: Build & push Spark Jobs image
        uses: docker/build-push-action@v6
        with:
          context: ./spark-jobs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
