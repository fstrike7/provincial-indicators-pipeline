name: Build & Publish DockerHub Images

on:
  push:
    branches: [develop, main]
    tags:
      - 'v*'

permissions:
  contents: read

env:
  DOCKERHUB_USER: fstrike7
  IMAGE_API_NAME: provincial-indicators-pipeline-api
  IMAGE_SPARK_NAME: provincial-indicators-pipeline-spark-jobs

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_API_NAME }}
          tags: |
            type=raw,value=dev-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=develop-latest,enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=main-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=ref,event=tag

      - name: Build & Push API Image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/${{ env.IMAGE_SPARK_NAME }}
          tags: |
            type=raw,value=dev-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=develop-latest,enable=${{ startsWith(github.ref, 'refs/heads/develop') }}
            type=raw,value=main-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/main') }}
            type=ref,event=tag

      - name: Build & Push Spark Jobs Image
        uses: docker/build-push-action@v6
        with:
          context: ./spark-jobs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
