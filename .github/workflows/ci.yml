name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build & test API
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify

  test-spark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        working-directory: spark-jobs
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest moto[s3]
      - name: Run PySpark tests
        working-directory: spark-jobs
        run: pytest -v