version: "3.9"

name: provincial-indicators

services:
  minio:
    image: minio/minio:RELEASE.2025-03-13T20-45-00Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - provincial-net

  # Prometheus para scrapear métricas (incluiremos la API cuando esté levantada)
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - provincial-net
    depends_on:
      - minio

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - provincial-net

  # Spring Boot API (se construirá localmente). Comentar si aún no querés build.
  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: provincial-indicators-api
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_BUCKET=indicadores-provincias
      - AWS_S3_REGION=us-east-1
      - AWS_S3_ACCESS_KEY=minio
      - AWS_S3_SECRET_KEY=minio123
    ports:
      - "8080:8080"
    depends_on:
      - minio
    networks:
      - provincial-net

volumes:
  minio-data:
  grafana-data:

networks:
  provincial-net:
    driver: bridge